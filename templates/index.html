<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:white;text-align:center">

<h1>🚀 PANEL PRO IPTV</h1>

<textarea id="urls" style="width:90%;height:100px;"></textarea><br><br>

<button onclick="add()">➕ Añadir</button>
<button onclick="scan()">🔄 Verificar</button>
<a href="/export"><button>📥 Exportar</button></a>

<h2>Resultados</h2>

{% for l in listas %}
<div style="margin:10px;padding:10px;background:#020617;border:1px solid #334155">
{{l[1]}}<br>
Estado: {{l[2]}}<br>
Última: {{l[4]}}
</div>
{% endfor %}

<script>
function add(){
fetch("/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({urls:document.getElementById("urls").value})
}).then(()=>location.reload());
}

function scan(){
fetch("/scan").then(()=>location.reload());
}
</script>

</body>
</html>
