<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:white;text-align:center">

<h1>IPTV PANEL PRO</h1>

<textarea id="urls" style="width:90%;height:120px;"></textarea><br><br>

<button onclick="add()">Añadir y Verificar</button>
<a href="/export"><button>Exportar TXT</button></a>

<h2>Resultados</h2>

<div id="resultados">
{% for l in listas %}
<pre style="background:#020617;padding:10px;margin:10px;">{{l[2]}}</pre>
{% endfor %}
</div>

<script>
function add(){
fetch("/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({urls:document.getElementById("urls").value})
}).then(()=>{
document.getElementById("urls").value=""
location.reload()
});
}
</script>

</body>
</html>
