<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:white;text-align:center">

<h1>🚀 PANEL PRIVADO ANTI-BAN</h1>

<textarea id="urls" style="width:90%;height:100px;"></textarea><br><br>

<button onclick="add()">➕ Añadir</button>
<button onclick="scan()">🧠 Escaneo humano</button>
<a href="/export"><button>📥 Exportar</button></a>
<a href="/logout"><button>🔐 Salir</button></a>

<h2>Resultados</h2>

{% for u in data %}
<div style="margin:10px;padding:10px;background:#020617">
{{u[1]}}<br>
Estado: {{u[2]}}<br>
Tiempo: {{u[3]}}s<br>
{{u[4]}}
</div>
{% endfor %}

<script>
function add(){
fetch("/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({urls:document.getElementById("urls").value})
}).then(()=>location.reload());
}

function scan(){
fetch("/scan").then(()=>alert("Procesando en cola..."));
}
</script>

</body>
</html>
